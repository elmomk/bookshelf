<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="42%" r="72%">
      <stop offset="0%" stop-color="#0c1330"/>
      <stop offset="55%" stop-color="#08080f"/>
      <stop offset="100%" stop-color="#050509"/>
    </radialGradient>
    <linearGradient id="page" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a2a33"/>
      <stop offset="100%" stop-color="#06141b"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="7" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- full-bleed background (maskable-safe) -->
  <rect width="512" height="512" fill="url(#bg)"/>
  <ellipse cx="256" cy="252" rx="178" ry="156" fill="#00f0ff" opacity="0.08"/>

  <g filter="url(#glow)">
    <!-- pages -->
    <path d="M256 152 C 210 126 150 118 104 134 L 104 362 C 150 346 210 354 256 380 Z"
          fill="url(#page)" stroke="#00f0ff" stroke-width="10"
          stroke-linejoin="round" stroke-linecap="round"/>
    <path d="M256 152 C 302 126 362 118 408 134 L 408 362 C 362 346 302 354 256 380 Z"
          fill="url(#page)" stroke="#00f0ff" stroke-width="10"
          stroke-linejoin="round" stroke-linecap="round"/>
    <!-- spine -->
    <line x1="256" y1="152" x2="256" y2="380" stroke="#00f0ff" stroke-width="10"
          stroke-linecap="round"/>
    <!-- text lines -->
    <g stroke="#00f0ff" stroke-width="6" stroke-linecap="round" opacity="0.7">
      <line x1="140" y1="190" x2="226" y2="180"/>
      <line x1="140" y1="224" x2="226" y2="214"/>
      <line x1="140" y1="258" x2="226" y2="248"/>
      <line x1="286" y1="180" x2="372" y2="190"/>
      <line x1="286" y1="214" x2="372" y2="224"/>
      <line x1="286" y1="248" x2="372" y2="258"/>
    </g>
  </g>

  <!-- bookmark ribbon -->
  <path d="M334 118 L334 268 L353 245 L372 268 L372 118 Z" fill="#ff2bd6" opacity="0.92"/>
</svg>
